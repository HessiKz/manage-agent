name: manage-agent

services:
  postgres:
    image: postgres:16-alpine
    container_name: ma-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-manage_agent}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-manage_agent}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ma-redis
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ma-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-manage_agent}
      DATABASE_SYNC_URL: postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin}@postgres:5432/${POSTGRES_DB:-manage_agent}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis}@redis:6379/0
      PYTHONPATH: /app
      APP_ENV: development
      CORS_ORIGINS: http://45.138.135.253,http://45.138.135.253:3000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh scripts/docker-entry.sh --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ma-frontend
    restart: unless-stopped
    # ponytail: dev bind-mount needs host uid — nextjs (1001) cannot write hessi-owned .next
    user: "${UID:-1000}:${GID:-1000}"
    env_file: ./frontend/.env
    environment:
      NODE_ENV: development
      # Same-origin /api/v1 via Next rewrites — works on localhost and public IP
      NEXT_PUBLIC_API_URL: ""
      INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_LOG_CLIENT_ERRORS: "false"
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend
    command: sh scripts/docker-dev-entry.sh

  nginx:
    image: nginx:alpine
    container_name: ma-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  redisdata:
