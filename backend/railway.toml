# Railway service config — set Root Directory to `backend` in the dashboard.
# https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
# Runs before the new deployment receives traffic (needs alembic in the image).
releaseCommand = "alembic upgrade head"
