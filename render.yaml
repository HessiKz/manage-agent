# Deploy the FastAPI backend on Render (free tier available).
# Frontend: deploy `frontend/` on Vercel — see docs/VERCEL.md
#
# Dashboard: New → Blueprint → connect repo → Render reads this file.

services:
  - type: web
    name: manage-agent-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: manage-agent-db
          property: connectionString
      - key: DATABASE_SYNC_URL
        fromDatabase:
          name: manage-agent-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: manage-agent-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ALLOW_VERCEL_PREVIEWS
        value: "true"
      - key: CORS_ALLOW_RAILWAY_DOMAINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        sync: false
      - key: FIRST_ADMIN_EMAIL
        value: admin@example.com
      - key: FIRST_ADMIN_PASSWORD
        generateValue: true
    autoDeploy: true

  - type: redis
    name: manage-agent-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: manage-agent-db
    plan: free
    databaseName: manage_agent
    user: manage_agent
