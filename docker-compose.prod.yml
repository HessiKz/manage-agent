# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Root .env supplies POSTGRES_*, REDIS_*, PUBLIC_URL

services:
  postgres:
    ports: !reset []
    restart: unless-stopped

  redis:
    ports: !reset []
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_SYNC_URL: postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CORS_ORIGINS: ${PUBLIC_URL}
      LOG_JSON: "true"
    # Persist runtime data (agent files, logs, demo reports)
    volumes:
      - backend_data:/app/var
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 1 --proxy-headers --forwarded-allow-ips="*"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "--max-time", "3", "http://127.0.0.1:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Empty → browser uses same-origin /api/v1 (nginx → backend). Never bake 127.0.0.1.
        NEXT_PUBLIC_API_URL: ""
        NEXT_PUBLIC_LOG_CLIENT_ERRORS: "true"
    restart: unless-stopped
    # Drop dev bind-mount, host user, and npm run dev
    user: !reset
    env_file: !reset []
    volumes: !reset
      - frontend_node_modules:/app/node_modules
    command: !reset
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ""
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  nginx:
    profiles:
      - prod
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

  # Optional: OpenAI-compatible proxy for Cursor agent CLI (profile: cursor)
  cursor-to-api:
    build:
      context: ./cursor-to-api
      dockerfile: Dockerfile
    container_name: ma-cursor-api
    restart: unless-stopped
    profiles:
      - cursor
    environment:
      CURSOR_TO_API_HOST: 0.0.0.0
      CURSOR_TO_API_PORT: 9191
      CURSOR_TO_API_WORKSPACE: /workspace
    volumes:
      - backend_data:/workspace/var:ro
    expose:
      - "9191"

volumes:
  backend_data:
  frontend_node_modules:

