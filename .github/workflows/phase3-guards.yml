name: phase3-guards

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  p0-guard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f pyproject.toml ]; then pip install -e .; fi
      - name: P0 sandbox guard
        run: python scripts/guard_p0_sandbox.py
      - name: Phase 3 regression tests
        run: python -m pytest tests/unit/test_sandbox_p0_guard.py tests/unit/test_skill_matcher.py tests/unit/test_failure_ledger.py -q
  frontend-tsc:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.json
